<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Hermes - Your personal AI agent</title>
  <desc>Hermes Dashboard social preview image</desc>
  
  <defs>
    <linearGradient id="sigilGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e05f40"/>
      <stop offset="100%" stop-color="#4a80c8"/>
    </linearGradient>
    <linearGradient id="centerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e05f40"/>
      <stop offset="100%" stop-color="#00b478"/>
    </linearGradient>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d0f17"/>
      <stop offset="100%" stop-color="#0a0b10"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>
  
  <!-- Large sigil centered -->
  <g transform="translate(600, 255)" filter="url(#glow)">
    <g transform="scale(4)">
      <path d="M0 -21 L21 0 L0 21 L-21 0 Z" fill="none" stroke="url(#sigilGradient)" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M0 -15 L15 0 L0 15 L-15 0 Z" fill="none" stroke="url(#sigilGradient)" stroke-width="1" stroke-linejoin="round" opacity="0.4"/>
      <line x1="-14" y1="0" x2="14" y2="0" stroke="url(#sigilGradient)" stroke-width="2" stroke-linecap="round"/>
      <line x1="0" y1="-21" x2="0" y2="0" stroke="url(#sigilGradient)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
      <line x1="0" y1="0" x2="0" y2="21" stroke="url(#sigilGradient)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
      <circle cx="0" cy="0" r="4.5" fill="url(#centerGradient)"/>
      <circle cx="0" cy="-21" r="2.5" fill="#e05f40"/>
      <circle cx="21" cy="0" r="2.5" fill="#4a80c8"/>
      <circle cx="0" cy="21" r="2.5" fill="#4a80c8"/>
      <circle cx="-21" cy="0" r="2.5" fill="#e05f40"/>
    </g>
  </g>
  
  <!-- Product name -->
  <text x="600" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="8">HERMES</text>
  
  <!-- Tagline -->
  <text x="600" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#8899aa" text-anchor="middle" letter-spacing="2">Your personal AI agent</text>
  
  <!-- Decorative line -->
  <line x1="500" y1="490" x2="700" y2="490" stroke="url(#sigilGradient)" stroke-width="2" opacity="0.5"/>
</svg>