<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <title>Hermes</title>
  <desc>Hermes Living Sigil favicon</desc>
  <defs>
    <linearGradient id="sg" x1="18%" y1="16%" x2="82%" y2="84%">
      <stop offset="0%" stop-color="#e05f40"/>
      <stop offset="50%" stop-color="#6ba3e0"/>
      <stop offset="100%" stop-color="#00b478"/>
    </linearGradient>
    <linearGradient id="dot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ba3e0"/>
      <stop offset="100%" stop-color="#00b478"/>
    </linearGradient>
    <radialGradient id="aura" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#00d490" stop-opacity="0.28"/>
      <stop offset="72%" stop-color="#00b478" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <!-- Dark rounded square background -->
  <rect width="64" height="64" rx="14" fill="#0a0b10"/>
  <circle cx="32" cy="32" r="19.5" fill="url(#aura)"/>
  <path d="M32 11 L50 32 L32 53 L14 32 Z"
        fill="#0a0b10" fill-opacity="0.92" stroke="#00b478" stroke-opacity="0.18" stroke-width="0.8"/>
  <path d="M32 11 L50 32 L32 53 L14 32 Z"
        fill="none" stroke="url(#sg)" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M32 18 L43.5 32 L32 46 L20.5 32 Z"
        fill="none" stroke="url(#sg)" stroke-width="1" stroke-linejoin="round" opacity="0.45"/>
  <line x1="18" y1="32" x2="46" y2="32" stroke="url(#sg)" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="14" x2="32" y2="50" stroke="url(#sg)" stroke-width="2" stroke-linecap="round" opacity="0.82"/>
  <path d="M23 18 H32 H41 M23 46 H32 H41" fill="none" stroke="#00b478" stroke-width="0.8" stroke-linecap="round" opacity="0.24"/>
  <!-- Central dot — the mind -->
  <circle cx="32" cy="32" r="4.9" fill="url(#dot)"/>
  <circle cx="32" cy="32" r="1.4" fill="#0a0b10" opacity="0.88"/>
  <!-- Corner terminals -->
  <circle cx="32" cy="11" r="2.5" fill="#e05f40"/>
  <circle cx="50" cy="32" r="2.5" fill="#00b478"/>
  <circle cx="32" cy="53" r="2.5" fill="#00b478"/>
  <circle cx="14" cy="32" r="2.5" fill="#e05f40"/>
</svg>
