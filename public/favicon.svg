<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <title>Hermes</title>
  <desc>Hermes AI Agent — Geometric Sigil Favicon</desc>
  <defs>
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e05f40"/>
      <stop offset="100%" stop-color="#4a80c8"/>
    </linearGradient>
    <linearGradient id="dot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e05f40"/>
      <stop offset="100%" stop-color="#00b478"/>
    </linearGradient>
  </defs>
  <!-- Dark rounded square background -->
  <rect width="64" height="64" rx="14" fill="#0a0b10"/>
  <!-- Outer diamond frame -->
  <path d="M32 11 L50 32 L32 53 L14 32 Z"
        fill="none" stroke="url(#sg)" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Inner diamond detail -->
  <path d="M32 17 L44 32 L32 47 L20 32 Z"
        fill="none" stroke="url(#sg)" stroke-width="1" stroke-linejoin="round" opacity="0.4"/>
  <!-- Horizontal crossbar -->
  <line x1="18" y1="32" x2="46" y2="32" stroke="url(#sg)" stroke-width="2" stroke-linecap="round"/>
  <!-- Vertical line upper -->
  <line x1="32" y1="11" x2="32" y2="32" stroke="url(#sg)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <!-- Vertical line lower -->
  <line x1="32" y1="32" x2="32" y2="53" stroke="url(#sg)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <!-- Central dot — the mind -->
  <circle cx="32" cy="32" r="4.5" fill="url(#dot)"/>
  <!-- Corner terminals -->
  <circle cx="32" cy="11" r="2.5" fill="#e05f40"/>
  <circle cx="50" cy="32" r="2.5" fill="#4a80c8"/>
  <circle cx="32" cy="53" r="2.5" fill="#4a80c8"/>
  <circle cx="14" cy="32" r="2.5" fill="#e05f40"/>
</svg>
